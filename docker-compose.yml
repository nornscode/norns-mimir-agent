services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mimir_agent
      POSTGRES_PASSWORD: mimir_agent
      POSTGRES_DB: mimir_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  mimir-agent:
    build:
      context: ..
      dockerfile: norns-mimir-agent/Dockerfile
    volumes:
      - ./:/app
      - /app/.venv
    working_dir: /app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mimir_agent:mimir_agent@db:5432/mimir_agent
      NORNS_URL: http://host.docker.internal:4001
      DEV_MODE: "true"
      WATCHFILES_FORCE_POLLING: "true"
      PYTHONDONTWRITEBYTECODE: "1"
    command: ["watchfiles", "--filter", "python", "uv run mimir-agent", "./mimir_agent"]

volumes:
  pgdata:
